name: build

on:
  release:
    types: [released, prereleased]
    branches:
      - master
      - beta
  workflow_dispatch:

jobs:
  build-docker:
    # runs on the fork; further downstream forks are skipped
    if: github.repository == 'jonny190/double-take'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Get VERSION
        id: version
        uses: notiz-dev/github-action-json-property@release
        with:
          path: ./package.json
          prop_path: version
      # Images publish to GHCR using the built-in GITHUB_TOKEN (no extra
      # secrets needed). Override the image name, registry included, with a
      # DOCKER_IMAGE repository variable; the login step must then be adjusted
      # to match the registry.
      - name: Set image name
        run: echo "IMAGE=${{ vars.DOCKER_IMAGE || format('ghcr.io/{0}', github.repository) }}" >> $GITHUB_ENV
      - name: Set ENV to beta
        if: ${{ github.event.release.target_commitish == 'beta' || (github.event_name == 'workflow_dispatch' && github.ref_name == 'beta') }}
        run: |
          echo "ARCH=linux/amd64" >> $GITHUB_ENV
          echo "TAGS=${IMAGE}:beta" >> $GITHUB_ENV
      - name: Set ENV to latest
        if: ${{ github.event.release.target_commitish == 'master' || (github.event_name == 'workflow_dispatch' && github.ref_name == 'master') }}
        run: |
          # arm/v7 dropped: NodeSource provides no Node 20 packages for armhf,
          # so the ubuntu:20.04-based Dockerfile cannot build it. Revisit with
          # the base-image migration (ROADMAP Phase 5).
          echo "ARCH=linux/amd64,linux/arm64" >> $GITHUB_ENV
          echo "TAGS=${IMAGE}:latest,${IMAGE}:${{steps.version.outputs.prop}}" >> $GITHUB_ENV
      - name: Version with SHA-7
        run: |
          npm version ${{steps.version.outputs.prop}}-$(echo ${GITHUB_SHA} | cut -c1-7) --no-git-tag-version
          cd ./api && npm version ${{steps.version.outputs.prop}}-$(echo ${GITHUB_SHA} | cut -c1-7) --no-git-tag-version
          cd ../frontend && npm version ${{steps.version.outputs.prop}}-$(echo ${GITHUB_SHA} | cut -c1-7) --no-git-tag-version
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-
      - name: Docker Login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker Buildx (build / push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./.build/Dockerfile
          platforms: ${{env.ARCH}}
          # a workflow_dispatch from a branch other than master/beta sets no
          # tags; build for validation only in that case
          push: ${{ env.TAGS != '' }}
          tags: ${{env.TAGS}}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new
      - # Temp fix
        # https://github.com/docker/build-push-action/issues/252
        # https://github.com/moby/buildkit/issues/1896
        name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache
